name: Build, Push & Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Job 1: 測試（確認語法沒有錯誤）
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

  # Job 2: Build Docker Image 並 Push 到 Docker Hub
  docker-build-push:
    needs: test                           # 測試通過才執行
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hello-world-railway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hello-world-railway:${{ github.sha }}

  # Job 3: 通知 Railway 部署新版本
  deploy-to-railway:
    needs: docker-build-push              # Image push 完才部署
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Railway Deploy
        run: |
          npm install -g @railway/cli
          railway redeploy --service ${{ secrets.RAILWAY_SERVICE_ID }} --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
